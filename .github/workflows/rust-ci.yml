name: Rust CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Check compilation
        run: cargo check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

  cooldown-self-check:
    name: Cargo cooldown self-check
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cooldown from this checkout
        run: cargo install --path . --locked

      - name: Check this repository with cargo-cooldown
        run: cargo cooldown check --locked
        env:
          COOLDOWN_CARGO_COMPATIBLE_ACCEPT: auto

      - name: Update this repository with cargo-cooldown
        run: |
          cargo cooldown update
          cargo metadata --locked --format-version 1 > /dev/null
        env:
          COOLDOWN_CARGO_COMPATIBLE_ACCEPT: auto
